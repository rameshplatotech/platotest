name: Playwright Java Automation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java-version: [ 17 ]
        browser: [ chromium ]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: maven
    
    - name: Install Playwright Browsers
      run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install"
    
    - name: Run tests with Maven
      run: mvn clean test -DsuiteXmlFile=src/test/resources/suites/googlesearch-suite.xml -Dbrowser=${{ matrix.browser }} -Dheadless=true
      env:
        MAVEN_OPTS: "-Xmx1024m"
    
    - name: Generate Allure Report
      if: always()
      run: mvn allure:report
    
    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.java-version }}-${{ matrix.browser }}
        path: allure-results/
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.java-version }}-${{ matrix.browser }}
        path: target/surefire-reports/

  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: java

    - name: Build project for CodeQL
      run: mvn -B -DskipTests package

    - name: Perform CodeQL analysis
      uses: github/codeql-action/analyze@v4

  spotbugs:
    name: SpotBugs Static Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        cache: maven

    - name: Run SpotBugs
      run: mvn -B -DskipTests spotbugs:check

    - name: Upload SpotBugs report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: spotbugs-report
        path: target/spotbugs/spotbugsXml.xml

  checkstyle:
    name: Checkstyle Lint
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        cache: maven

    - name: Run Checkstyle
      run: mvn -B -DskipTests checkstyle:check

    - name: Upload Checkstyle report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: checkstyle-report
        path: target/checkstyle-result.xml

  publish-report:
    runs-on: ubuntu-latest
    if: always()
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
    
    - name: Publish Allure Report to GitHub Pages
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20
