# Application Configuration Properties
# These properties can be accessed using ConfigManager class

# Browser Configuration
browser.type=chromium
browser.headless=true
browser.timeout=30000
# Viewport constraints align with BrowserManager's maximize helper
browser.width=1920
browser.height=1080

# Logging Configuration
logging.level=INFO

# Test Data
test.retry.count=2
test.retry.delay=1000

# Wait Configuration
wait.implicit.timeout=30
wait.explicit.timeout=30
wait.page.load.timeout=60
